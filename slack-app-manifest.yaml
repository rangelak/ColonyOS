display_information:
  name: ColonyOS
  description: Autonomous AI engineering pipeline — trigger builds from Slack.
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: ColonyOS
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      # channels:history is required by the message.channels event
      # subscription below for thread-fix detection (reading threaded
      # replies).  If you only need @mention triggers, you can remove
      # this scope and the message.channels event subscription.
      - channels:history
      - channels:read
      - chat:write
      - groups:read
      - reactions:read
      - reactions:write

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - reaction_added
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
