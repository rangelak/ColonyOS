services:
  colonyos:
    build: .
    image: ghcr.io/rangelak/colonyos:latest
    ports:
      - "7400:7400"
    volumes:
      - ${COLONYOS_WORKSPACE:-./}:/workspace
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7400/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
