name: Release

on:
  push:
    tags: ["v*"]

permissions: {}  # Enforce least privilege; grant per-job below

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Note: PyPI Trusted Publisher Setup
# 1. Go to https://pypi.org/manage/project/colonyos/settings/publishing/
# 2. Add a new "GitHub Actions" publisher:
#    - Owner: rangelak
#    - Repository: ColonyOS
#    - Workflow name: release.yml
#    - Environment: pypi
# 3. No API tokens needed — OIDC handles authentication automatically.

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.whl > SHA256SUMS.txt
          cat SHA256SUMS.txt
          # Move checksums out of dist/ so they are NOT uploaded to PyPI
          mv SHA256SUMS.txt ../SHA256SUMS.txt

      - name: Upload build artifacts (for PyPI)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

      - name: Upload checksums artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: checksums
          path: SHA256SUMS.txt

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC Trusted Publisher
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@4bb033805d9e19112d8c697528791ff53f6c2f74  # v1.9.0

  release:
    name: Create GitHub Release
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Download checksums
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: checksums
          path: .

      - name: Extract changelog for this release
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract the latest section from CHANGELOG.md (between first two ## headers)
          NOTES=$(awk '/^## /{if(found) exit; found=1; next} found{print}' CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}. See CHANGELOG.md for details."
          fi
          # Write release notes — use printf to avoid HEREDOC indentation issues
          {
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            echo "## Installation"
            echo ""
            echo '```bash'
            echo "# pip / pipx"
            echo "pip install colonyos==${TAG#v}"
            echo "# or: pipx install colonyos==${TAG#v}"
            echo ""
            echo "# curl"
            echo "curl -sSL https://raw.githubusercontent.com/rangelak/ColonyOS/main/install.sh | sh"
            echo ""
            echo "# Homebrew"
            echo "brew tap colonyos/tap"
            echo "brew install colonyos"
            echo '```'
          } > /tmp/release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release_notes.md \
            dist/* SHA256SUMS.txt

  update-homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: main

      - name: Download checksums
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: checksums
          path: .

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Get the SHA256 of the sdist tarball from the checksums file
          TARBALL_SHA=$(grep "colonyos-.*\.tar\.gz" SHA256SUMS.txt | awk '{print $1}')
          if [ -z "$TARBALL_SHA" ]; then
            echo "ERROR: Could not find tarball SHA in SHA256SUMS.txt"
            exit 1
          fi

          # Update the formula with the new version and SHA
          sed -i "s|url \"https://pypi.io/packages/source/c/colonyos/colonyos-.*\.tar\.gz\"|url \"https://pypi.io/packages/source/c/colonyos/colonyos-${VERSION}.tar.gz\"|" Formula/colonyos.rb
          sed -i "s|sha256 \".*\"|sha256 \"${TARBALL_SHA}\"|" Formula/colonyos.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/colonyos.rb
          git commit -m "chore: update Homebrew formula to ${TAG}" || echo "No changes to commit"
          git push
