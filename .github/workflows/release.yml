name: Release

on:
  push:
    tags: ["v*"]

permissions: {}  # Enforce least privilege; grant per-job below

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Note: PyPI Trusted Publisher Setup
# 1. Go to https://pypi.org/manage/project/colonyos/settings/publishing/
# 2. Add a new "GitHub Actions" publisher:
#    - Owner: rangelak
#    - Repository: ColonyOS
#    - Workflow name: release.yml
#    - Environment: pypi
# 3. No API tokens needed — OIDC handles authentication automatically.

jobs:
  # Reuse the CI workflow instead of duplicating the test job
  test:
    name: Test gate
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # Full history for setuptools-scm

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.whl > SHA256SUMS.txt
          # Also checksum install.sh for FR-4.6
          sha256sum ../install.sh >> SHA256SUMS.txt
          cat SHA256SUMS.txt
          # Move checksums out of dist/ so they are NOT uploaded to PyPI
          mv SHA256SUMS.txt ../SHA256SUMS.txt

      - name: Upload build artifacts (for PyPI)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: dist
          path: dist/

      - name: Upload checksums artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: checksums
          path: SHA256SUMS.txt

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC Trusted Publisher
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0

  release:
    name: Create GitHub Release
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: dist
          path: dist/

      - name: Download checksums
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: checksums
          path: .

      - name: Extract changelog for this release
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract the latest section from CHANGELOG.md (between first two ## headers)
          NOTES=$(awk '/^## /{if(found) exit; found=1; next} found{print}' CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}. See CHANGELOG.md for details."
          fi
          # Write release notes — use printf to avoid HEREDOC indentation issues
          {
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            echo "## Installation"
            echo ""
            echo '```bash'
            echo "# Homebrew (macOS)"
            echo "brew install rangelak/colonyos/colonyos"
            echo ""
            echo "# pip / pipx"
            echo "pip install colonyos==${TAG#v}"
            echo "# or: pipx install colonyos==${TAG#v}"
            echo ""
            echo "# curl"
            echo "curl -fsSL https://raw.githubusercontent.com/rangelak/ColonyOS/main/install.sh | sh -s -- --yes"
            echo '```'
          } > /tmp/release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release_notes.md \
            dist/* SHA256SUMS.txt

  update-homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    concurrency:
      group: homebrew-tap-update
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: dist
          path: dist/

      - name: Extract version and SHA-256
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Compute SHA-256 of the sdist tarball — use exact version to avoid glob ambiguity
          SDIST_FILE="dist/colonyos-${VERSION}.tar.gz"
          if [ ! -f "$SDIST_FILE" ]; then
            echo "::error::Expected sdist not found: $SDIST_FILE"
            echo "Available files:" >&2
            ls -la dist/*.tar.gz >&2 || true
            exit 1
          fi
          SHA256=$(sha256sum "$SDIST_FILE" | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

          echo "Version: ${VERSION}" >&2
          echo "SHA-256: ${SHA256}" >&2

      - name: Generate Homebrew formula
        run: |
          chmod +x scripts/generate-homebrew-formula.sh
          scripts/generate-homebrew-formula.sh \
            "${{ steps.meta.outputs.version }}" \
            "${{ steps.meta.outputs.sha256 }}" \
            --output /tmp/colonyos.rb

      - name: Push formula to tap repository
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"

          # Clone the tap repo using a credential helper to avoid token in URL/logs
          git clone "https://github.com/rangelak/homebrew-colonyos.git" /tmp/tap
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config credential.helper '!f() { echo "username=x-access-token"; echo "password=${HOMEBREW_TAP_TOKEN}"; }; f'

          # Copy the generated formula
          mkdir -p Formula
          cp /tmp/colonyos.rb Formula/colonyos.rb

          # Commit and push — pull --rebase first to handle concurrent tag pushes
          git add Formula/colonyos.rb
          git commit -m "Update colonyos formula to ${VERSION}"
          git pull --rebase origin main
          git push origin main

      - name: Open issue on tap update failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          gh issue create \
            --repo rangelak/ColonyOS \
            --title "Homebrew tap update failed for v${VERSION}" \
            --body "The \`update-homebrew\` job failed for release v${VERSION}. The PyPI package was published successfully, but the Homebrew formula was not updated. Please investigate the [workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) and manually update the tap if needed."
